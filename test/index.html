<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Баннер "Запросить расчет" - Верстка</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section class="banner-quote-form sec-offset">
      <div class="container">
        <div class="banner-quote-form__wrap">
          <!-- Левая часть с формой -->
          <div class="banner-quote-form__content">
            <h2 class="sec__title" data-aos="fade-up">
              Рассчитаем стоимость вашего автомобиля
            </h2>

            <form class="banner-quote-form__form">
              <div class="banner-quote-form__field">
                <input
                  class="banner-quote-form__input"
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="Телефон"
                  required
                />
              </div>

              <div class="banner-quote-form__field">
                <textarea
                  class="banner-quote-form__textarea"
                  id="message"
                  name="message"
                  rows="3"
                  placeholder="Комментарий"
                ></textarea>
              </div>

              <button class="banner-quote-form__btn" type="submit">
                Получить расчет
              </button>

              <div class="banner-quote-form__checkbox">
                <label class="banner-quote-form__checkbox-label">
                  <input type="checkbox" name="agreement" required />
                  <span>
                    Нажимая на кнопку, вы даёте согласие на обработку
                    персональных данных
                  </span>
                </label>
              </div>
            </form>
          </div>

          <!-- Правая часть с картинкой -->
          <div class="banner-quote-form__image">
            <img
              class="banner-quote-form__img"
              src="img/banner-image.jpg"
              alt="Запросить расчет"
            />
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
