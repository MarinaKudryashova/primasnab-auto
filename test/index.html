<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Баннер "Запросить расчет" - Верстка</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/vendor.css" />

    <style>
      body {
        background-color: #161616;
        padding: 50px 0;
        font-family: var(--font-family, "Discovery", sans-serif);
      }

      :root {
        --font-family: "Discovery", sans-serif;
        --second-family: "Banana Brick", sans-serif;
        --accent-blue: #5aa7b9;
        --accent-pink: #c64994;
        --black: #161616;
        --white: #fff;
        --white-60: rgba(255, 255, 255, 0.6);
        --transition-300: 0.3s ease-in-out;
      }

      .social-follow__wrap {
        display: flex;
        /* gap: 55px; */
      }

      .social-follow__content {
        margin-right: 0;
        margin-top: 40px;
      }

      .social-follow__title {
        --title-mb: 14px;
      }

      .social-follow__descr {
        margin: 0;
        margin-bottom: auto;
        font-family: var(--font-family);
        font-weight: 400;
        font-size: 24px;
        line-height: 100%;
        color: var(--white);
      }

      .social-follow__left {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-right: 55px;
        margin-top: 22px;
      }

      .social-follow__left .messanges {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .social-follow__image {
        position: relative;
        display: inline-block;
      }

      .social-follow__picture {
        position: absolute;
        width: 619px;
        height: 619px;
        top: -104px;
        right: -39px;
        transform: rotate(-5deg);
        opacity: 1;
        filter: drop-shadow(10px 10px 13px var(--accent-blue));
        /* filter: drop-shadow(0 0 20px var(--accent-blue)); */
      }

      .social-follow__right {
        position: relative;
        display: inline-block;
        flex-shrink: 0; /* запрещаем сжатие */
        width: 780px;
        max-width: 100%;
      }

      .social-follow__right-image {
        border-radius: 40px;
        width: 780px;
        max-width: 100%;
        height: auto;
        object-fit: cover;
      }

      .social-follow__right-inner {
        position: absolute;
        bottom: 36px; /* отступ от низа картинки */
        left: 50%; /* центрируем относительно картинки */
        transform: translateX(-50%); /* точное центрирование */
        width: 90%; /* ширина относительно картинки */
        max-width: 721px;
        display: flex;
        align-items: center;
        border-radius: 20px;
        border: 1px solid var(--white);
        background: rgba(22, 22, 22, 0.6);
        z-index: 2;
      }

      .social-follow__right-icon {
        flex-shrink: 0;
        margin-left: 20px;
      }

      .social-follow__right-text {
        padding: 26px 0;
        margin: 0;
        font-weight: 400;
        font-size: 24px;
        color: var(--white);
      }

      .social-follow .messanges__link {
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 11px;
        width: 96px;
        height: 96px;
        background-color: var(--accent-pink);
        transition: all var(--transition-300);
        border: 2px solid var(--white);
        box-shadow: 0 0 20px 0 var(--accent-blue);
      }

      .social-follow .messanges__link.messanges__link-circle {
        border-radius: 100%;
      }

      .social-follow .messanges__link:hover {
        background-color: var(--accent-blue);
        /* transform: scale(1.05); */
        box-shadow: 0 0 20px 0 var(--accent-blue);
      }

      .social-follow .messanges__icon {
        width: 48px;
        height: 48px;
        filter: brightness(0) invert(1);
      }
    </style>
  </head>

  <body>
    <section class="social-follow sec-offset">
      <div class="container">
        <div class="social-follow__wrap">
          <!-- Левая часть мессенджерами -->

          <div class="social-follow__content">
            <div class="social-follow__content-up">
              <h2 class="social-follow__title sec-title" data-aos="fade-up">
                Мы в соцсетях
              </h2>
              <span class="social-follow__descr"
                >Подписывайтесь и узнавайте первыми о новостях компании</span
              >
            </div>
            <div class="social-follow__left">
              <div class="social-follow__image">
                <picture class="social-follow__picture">
                  <img
                    class="social-follow__picture"
                    src="97ae8f1f00d1a6f97d7c83731d259adc3b2e8c1a.png"
                    alt="Телефон"
                    width="619"
                    height="619"
                  />
                </picture>
              </div>

              <div class="social-follow__var">
                <ul
                  class="social-follow__messanger messanges"
                  title="messanges"
                >
                  <li class="messanges__item">
                    <a
                      href="https://t.me/primasnabavto"
                      target="_blank"
                      class="messanges__link messanges__link-circle"
                      aria-label="Свяжитесь с нами в Telegram"
                    >
                      <img
                        loading="lazy"
                        src="https://primasnub.cosmo-design.ru/wp-content/themes/primasnab/img/icon/telegram.svg"
                        class="messanges__icon"
                        width="40"
                        height="40"
                        alt="иконка Telegram"
                        aria-hidden="true"
                      />
                    </a>
                  </li>
                  <li class="messanges__item">
                    <a
                      href="https://wa.me/79175487878"
                      target="_blank"
                      class="messanges__link"
                      aria-label="Свяжитесь с нами в Whatsapp"
                    >
                      <img
                        loading="lazy"
                        src="https://primasnub.cosmo-design.ru/wp-content/themes/primasnab/img/icon/whatsapp.svg"
                        class="messanges__icon"
                        width="40"
                        height="40"
                        alt="иконка Whatsapp"
                        aria-hidden="true"
                      />
                    </a>
                  </li>
                  <li class="messanges__item">
                    <a
                      href="https://t.me/primasnabavto"
                      target="_blank"
                      class="messanges__link"
                      aria-label="Свяжитесь с нами в Telegram"
                    >
                      <img
                        loading="lazy"
                        src="https://primasnub.cosmo-design.ru/wp-content/themes/primasnab/img/icon/telegram.svg"
                        class="messanges__icon"
                        width="40"
                        height="40"
                        alt="иконка Telegram"
                        aria-hidden="true"
                      />
                    </a>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <!-- Правая часть с картинкой -->
          <div class="social-follow__right">
            <img
              class="social-follow__right-image"
              src="social-follow.png"
              alt="Двое мужчин разговаривают"
              width="780"
              height="784"
              loading="lazy"
            />
            <div class="social-follow__right-inner">
              <img
                loading="lazy"
                src="https://primasnub.cosmo-design.ru/wp-content/themes/primasnab/img/icon/post_contact.svg"
                class="social-follow__right-icon"
                width="69"
                height="69"
                alt="иконка конверта"
                aria-hidden="true"
              />

              <p class="social-follow__right-text">
                Автоновости, обзоры на&nbsp;саме крутые авто, полезная
                информация в&nbsp;наших социальных сетях
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>

  <script src="../js/main.min.js"></script>
</html>
